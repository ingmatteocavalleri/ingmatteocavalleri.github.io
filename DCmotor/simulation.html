<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Motor Simulation — Carelli 1928 | Matteo Cavalleri</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --green: #3fb950;
      --yellow: #e3b341;
      --text: #e6edf3;
      --muted: #8b949e;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Syne', sans-serif;
      --body: 'Inter', sans-serif;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      line-height: 1.5
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: rgba(8, 12, 16, .97);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--accent);
      text-decoration: none
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 3px;
      text-decoration: none
    }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 32px 60px
    }

    .page-title {
      font-family: var(--display);
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px
    }

    .page-sub {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
      margin-bottom: 20px
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 14px
    }

    .btn {
      font-family: var(--mono);
      font-size: .78rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 3px;
      border: none;
      cursor: pointer
    }

    .btn-play {
      background: var(--accent);
      color: #080c10
    }

    .btn-stop {
      background: rgba(255, 107, 53, .15);
      color: var(--accent2);
      border: 1px solid rgba(255, 107, 53, .3)
    }

    canvas {
      display: block;
      width: 100%
    }

    .plots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px
    }

    .pc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px
    }

    .pc-title {
      font-family: var(--mono);
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase
    }

    .track-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 14px
    }

    .track-hdr {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px
    }

    .track-lbl {
      font-family: var(--mono);
      font-size: .62rem;
      color: var(--accent)
    }

    .track-km {
      font-family: var(--mono);
      font-size: .72rem
    }
  </style>
</head>

<body>

  <nav>
    <a href="./" class="nav-logo">mc.eng / carelli-1928</a>
    <a href="./" class="nav-back">← Report</a>
  </nav>

  <div class="wrapper">

    <div class="page-title">Cascade PI Simulation</div>
    <div class="page-sub">// Tramway "Carelli 1928" · DC Motor Speed Control</div>

    <div class="ctrl">
      <button class="btn btn-play" id="btnPlay">▶ Start</button>
      <button class="btn btn-stop" id="btnStop" disabled>⏹ Stop</button>
    </div>

    <div class="track-wrap">
      <div class="track-hdr">
        <span class="track-lbl">// Percorso</span>
        <span class="track-km" id="track-km">0.00 / 10.00 km</span>
      </div>
      <canvas id="cTrack"></canvas>
    </div>

    <div class="plots">
      <div class="pc">
        <div class="pc-title">Velocità</div>
        <canvas id="cSpeed"></canvas>
      </div>

      <div class="pc">
        <div class="pc-title">Corrente armatura</div>
        <canvas id="cIa"></canvas>
      </div>

      <div class="pc">
        <div class="pc-title">Corrente eccitatrice</div>
        <canvas id="cIe"></canvas>
      </div>

      <div class="pc">
        <div class="pc-title">Coppia</div>
        <canvas id="cTe"></canvas>
      </div>
    </div>

  </div>

  <script>

    const DPR = window.devicePixelRatio || 1;
    const CV = {};

    function setupCanvas(id, h) {

      const c = document.getElementById(id);
      const rect = c.getBoundingClientRect();
      const w = rect.width || c.parentElement.clientWidth;

      if (!w) return false;

      c.width = w * DPR;
      c.height = h * DPR;

      c.style.height = h + "px";

      const ctx = c.getContext("2d");
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      CV[id] = { ctx, w, h };

      return true;
    }

    function setupAll() {

      if (!setupCanvas("cTrack", 60)) return requestAnimationFrame(setupAll);
      if (!setupCanvas("cSpeed", 160)) return requestAnimationFrame(setupAll);
      if (!setupCanvas("cIa", 160)) return requestAnimationFrame(setupAll);
      if (!setupCanvas("cIe", 160)) return requestAnimationFrame(setupAll);
      if (!setupCanvas("cTe", 160)) return requestAnimationFrame(setupAll);

    }

    function clearPlot(id) {

      const cv = CV[id];
      if (!cv) return;

      const { ctx, w, h } = cv;

      ctx.fillStyle = "#0d1117";
      ctx.fillRect(0, 0, w, h);

    }

    function drawTrack() {

      const cv = CV.cTrack;
      if (!cv) return;

      const { ctx, w, h } = cv;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = "#00d4ff";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();

    }

    let running = false;
    let raf;

    function frame() {

      if (!running) return;

      drawTrack();

      requestAnimationFrame(frame);

    }

    document.getElementById("btnPlay").onclick = () => {

      if (!running) {
        running = true;
        frame();
      }

    }

    document.getElementById("btnStop").onclick = () => {

      running = false;

    }

    function init() {

      setupAll();

      if (!CV.cTrack) return requestAnimationFrame(init);

      drawTrack();

      ["cSpeed", "cIa", "cIe", "cTe"].forEach(clearPlot);

    }

    requestAnimationFrame(init);

  </script>

</body>

</html>
