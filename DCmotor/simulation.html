<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DC Motor Simulation — Carelli 1928</title>

  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --green: #3fb950;
      --yellow: #e3b341;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    .wrapper {
      max-width: 1200px;
      margin: auto;
      padding: 30px;
    }

    .ctrl {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 8px 18px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .btn-play {
      background: var(--accent)
    }

    .btn-stop {
      background: var(--accent2)
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .sc {
      background: var(--surface);
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    canvas {
      width: 100%;
      display: block;
    }

    .plots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pc {
      background: var(--surface);
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <h2>Cascade PI Simulation – DC Motor Tram</h2>

    <div class="ctrl">
      <button id="btnPlay" class="btn btn-play">Start</button>
      <button id="btnStop" class="btn btn-stop">Stop</button>
    </div>

    <div class="stats">
      <div class="sc">Speed: <span id="sv-v">0</span> m/s</div>
      <div class="sc">Current: <span id="sv-ia">0</span> A</div>
      <div class="sc">Field: <span id="sv-ie">5</span> A</div>
      <div class="sc">Torque: <span id="sv-te">0</span> Nm</div>
    </div>

    <div class="plots">

      <div class="pc">
        <canvas id="cSpeed" height="160"></canvas>
      </div>

      <div class="pc">
        <canvas id="cIa" height="160"></canvas>
      </div>

      <div class="pc">
        <canvas id="cIe" height="160"></canvas>
      </div>

      <div class="pc">
        <canvas id="cTe" height="160"></canvas>
      </div>

    </div>
  </div>

  <script>

    // physics parameters
    const Ra = 0.39, La = 3.9e-3
    const Re = 12, Le = 1.2
    const Ks = 1.06
    const Ie_rated = 5
    const Imax = 156
    const Vdc = 600

    const Ts = 0.005
    const omega_base = 101.6

    let t, x, v_veh, omega, ia, ie
    let ia_int, ie_int, omega_int
    let running = false

    const HMAX = 500
    const h_v = [], h_ia = [], h_ie = [], h_te = []

    // reset
    function resetSim() {
      t = 0
      x = 0
      v_veh = 0
      omega = 0
      ia = 0
      ie = Ie_rated
      ia_int = 0
      ie_int = 0
      omega_int = 0

      h_v.length = 0
      h_ia.length = 0
      h_ie.length = 0
      h_te.length = 0
    }

    // simulation step
    function simStep() {

      const v_ref = 11.67

      const omega_ref = v_ref / 0.12

      const e_om = omega_ref - omega

      let Te_ref = 181.2 * e_om + omega_int

      const Te_sat = Math.max(-900, Math.min(900, Te_ref))

      omega_int += Ts * (1.62 * e_om)

      const ia_ref = Math.max(-Imax, Math.min(Imax, Te_sat / (Ks * ie)))

      const e_ia = ia_ref - ia

      let Va = 0.078 * e_ia + ia_int + Ks * ie * omega

      const Va_sat = Math.max(-Vdc, Math.min(Vdc, Va))

      ia_int += Ts * (7.8 * e_ia)

      ia += Ts * (Va_sat - Ra * ia - Ks * ie * omega) / La

      ie += Ts * (0 - Re * ie) / Le

      const Te = Ks * ie * ia

      omega += Ts * (Te - 0.8 * omega) / 9.1

      v_veh = omega * 0.12

      t += Ts

      h_v.push(v_veh)
      h_ia.push(ia)
      h_ie.push(ie)
      h_te.push(Te)

      if (h_v.length > HMAX) {
        h_v.shift()
        h_ia.shift()
        h_ie.shift()
        h_te.shift()
      }

      return Te
    }

    // drawing
    function drawPlot(canvas, data, min, max) {

      const ctx = canvas.getContext("2d")
      const W = canvas.width
      const H = canvas.height

      ctx.fillStyle = "#0d1117"
      ctx.fillRect(0, 0, W, H)

      if (data.length < 2) return

      ctx.strokeStyle = "#00d4ff"
      ctx.lineWidth = 2
      ctx.beginPath()

      data.forEach((v, i) => {
        const x = i / (data.length - 1) * W
        const y = H - (v - min) / (max - min) * H
        if (i === 0) ctx.moveTo(x, y)
        else ctx.lineTo(x, y)
      })

      ctx.stroke()
    }

    // animation
    function frame() {

      if (!running) return

      const Te = simStep()

      document.getElementById("sv-v").textContent = v_veh.toFixed(2)
      document.getElementById("sv-ia").textContent = ia.toFixed(1)
      document.getElementById("sv-ie").textContent = ie.toFixed(2)
      document.getElementById("sv-te").textContent = Math.round(Te)

      drawPlot(cSpeed, h_v, 0, 14)
      drawPlot(cIa, h_ia, -160, 160)
      drawPlot(cIe, h_ie, 0, 5.5)
      drawPlot(cTe, h_te, -900, 900)

      requestAnimationFrame(frame)
    }

    // buttons
    btnPlay.onclick = () => {
      if (!running) {
        running = true
        frame()
      }
    }

    btnStop.onclick = () => {
      running = false
      resetSim()
    }

    // init
    const cSpeed = document.getElementById("cSpeed")
    const cIa = document.getElementById("cIa")
    const cIe = document.getElementById("cIe")
    const cTe = document.getElementById("cTe")

    resetSim()

  </script>

</body>

</html>
